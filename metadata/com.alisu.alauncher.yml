AuthorName: Alisuuu

Name: Alauncher
Summary: Minimalist Android launcher with futuristic themes

Description: >-
  Alauncher is a minimalist Android launcher with neon and futuristic themes.
  Features include gesture navigation, widget support, icon pack management
  with monochromatic tinting, music player widget via MediaSession, weather
  display, customizable clock styles, drag and drop organization, double tap
  to sleep, global search, and tablet support. Material Design with smooth
  animations. Lightweight and fast. No ads, no tracking.

